      float w = id(w2).state;
      if (std::isnan(v)) return {};
      if (v >= d) return 0.0;
      if (v <= w) return 100.0;
      float result = (v - d) / (w - d) * 100.0;
      return result;
    filters:
      - sliding_window_moving_average:
          window_size: 6
