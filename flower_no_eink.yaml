  - platform: adc
    pin: GPIO3
    name: "P3电压 Voltage"
    id: raw_3
    unit_of_measurement: "V"
    attenuation: 12db
    update_interval: never
    accuracy_decimals: 3
    force_update: true
    filters:
      - lambda: |-
          static std::vector<float> buf;
          static uint32_t last_time = 0;
          uint32_t now = millis();
          if (now - last_time > 2000) {
            buf.clear();
          }
          last_time = now;
          buf.push_back(x);
