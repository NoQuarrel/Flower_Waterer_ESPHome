text_sensor:
  - platform: template
    name: "定时格式提示 Schedule Hint"
    id: watering_schedule_hint
    icon: "mdi:alert-circle-outline"
    entity_category: diagnostic
    update_interval: never

  - platform: template
    name: "P1上次浇水时间 Last Time"
    id: watered_1
    update_interval: never

  - platform: template
    name: "P2上次浇水时间 Last Time"
    id: watered_2
    update_interval: never

  - platform: template
    name: "P3上次浇水时间 Last Time"
    id: watered_3
    update_interval: never
    
  - platform: template
    name: "P4上次浇水时间 Last Time"
    id: watered_4
    update_interval: never

# ==========================================
# 脚本
# ==========================================
script:
  - id: watering_schedule_validate
    mode: restart
    then:
      - lambda: |-
          std::string mode = id(watering_mode).current_option().c_str();
          auto trim = [](std::string value) -> std::string {
            const char* ws = " \t\r\n";
            size_t start = value.find_first_not_of(ws);
            if (start == std::string::npos) return "";
            size_t end = value.find_last_not_of(ws);
            return value.substr(start, end - start + 1);
          };

          auto is_valid_hhmm = [](const std::string &value) -> bool {
            if (value.size() != 5) return false;
            if (value[2] != ':') return false;
            if (!std::isdigit((unsigned char)value[0])) return false;
            if (!std::isdigit((unsigned char)value[1])) return false;
            if (!std::isdigit((unsigned char)value[3])) return false;
            if (!std::isdigit((unsigned char)value[4])) return false;
            int hour = (value[0] - '0') * 10 + (value[1] - '0');
            int minute = (value[3] - '0') * 10 + (value[4] - '0');
            return hour >= 0 && hour <= 23 && minute >= 0 && minute <= 59;
          };

          std::string schedule = id(watering_times).state;
          std::string error = "";
          if (mode == "关闭") {
            error = "";
          } else if (mode == "传感器") {
            error = "";
          } else {
            std::string schedule_trimmed = trim(schedule);
            if (schedule_trimmed.empty()) {
              error = "请填写定时，例如 06:30=13,18:00=24";
            } else {
              size_t start = 0;
              while (start < schedule.size()) {
                size_t end = schedule.find_first_of(",;\n", start);
                std::string token = schedule.substr(start, end == std::string::npos ? schedule.size() - start : end - start);
                token = trim(token);
                if (!token.empty()) {
                  size_t sep = token.find_first_of("=|");
                  std::string time_part = trim(sep == std::string::npos ? token : token.substr(0, sep));
                  if (!is_valid_hhmm(time_part)) {
                    error = "定时错误: " + time_part + " 不是 HH:MM";
                    break;
                  }
                  if (sep != std::string::npos) {
                    std::string mask_part = trim(token.substr(sep + 1));
                    if (mask_part.empty()) {
                      error = "定时错误: " + time_part + "= 后面不能为空";
                      break;
                    }
                    for (char c : mask_part) {
                      if (c != '1' && c != '2' && c != '3' && c != '4') {
                        error = "定时错误: 只能包含 1-4";
                        break;
                      }
                    }
                    if (!error.empty()) break;
                  }
                }
                if (end == std::string::npos) break;
                start = end + 1;
              }
            }
          }

          id(watering_schedule_error) = error;
      - text_sensor.template.publish:
          id: watering_schedule_hint
          state: !lambda |-
            std::string mode = id(watering_mode).current_option().c_str();
            if (mode == "定时" && !id(watering_schedule_error).empty()) {
              return id(watering_schedule_error);
            } else if (mode == "定时") {
              return std::string("定时格式正确");
            } else {
              return std::string("未运行定时模式");
            }
      - if:
          condition:
            lambda: |-
              return id(watering_schedule_error).empty();
          then:
            - homeassistant.action:
                action: persistent_notification.dismiss
                data:
                  notification_id: watering_schedule
          else:
            - homeassistant.action:
                action: persistent_notification.create
                data:
                  notification_id: watering_schedule
                  title: Water Schedule
                  message: !lambda |-
                    return id(watering_schedule_error);

  - id: watering_cycle
    mode: queued
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          std::string today = now.strftime("%Y-%m-%d");
          if (id(today_date) != today) {
            id(today_date) = today;
            id(today_watered_seconds_1) = 0;
            id(today_watered_seconds_2) = 0;
            id(today_watered_seconds_3) = 0;
            id(today_watered_seconds_4) = 0;
          }
      - if:
          condition:
            lambda: |-
              return !id(tank_empty).state || id(ignore_water_check).state;
          then:
            - if:
                condition:
                  lambda: |-
                    return ( !id(tank_empty).state || id(ignore_water_check).state )
                           && id(watering_seconds_1).state > 0
                           && (id(watering_schedule_mask) & 0x1)
                           && (id(daily_limit_1).state == 0 || id(today_watered_seconds_1) < id(daily_limit_1).state);
                then:
                  - lambda: |-
                      id(watering_by_script) = true;
                  - light.turn_on:
                      id: pump_1
                      brightness: !lambda |-
                        return std::min(1.0f, id(watering_percent_1).state / 100.0f + 0.2f);
                  - delay: 1000ms
                  - light.turn_on:
                      id: pump_1
                      brightness: !lambda |-
                        return id(watering_percent_1).state / 100.0f;
                      transition_length: 1s
                  - repeat:
                      count: !lambda |-
                        return (int)(id(watering_seconds_1).state * 10);
                      then:
                        - delay: 100ms
                        - if:
                            condition:
                              lambda: |-
                                return id(tank_empty).state && !id(ignore_water_check).state;
                            then:
                              - light.turn_off: pump_1
                              - lambda: |-
                                  id(watering_by_script) = false;
                              - script.stop: watering_cycle
                  - light.turn_off: pump_1
                  - lambda: |-
                      id(watering_by_script) = false;
                      id(today_watered_seconds_1) += (int)id(watering_seconds_1).state;
                  - sensor.template.publish:
                      id: today_seconds_1
                      state: !lambda "return (float)id(today_watered_seconds_1);"
            - if:
                condition:
                  lambda: |-
                    return ( !id(tank_empty).state || id(ignore_water_check).state )
                           && id(watering_seconds_2).state > 0
                           && (id(watering_schedule_mask) & 0x2)
                           && (id(daily_limit_2).state == 0 || id(today_watered_seconds_2) < id(daily_limit_2).state);
                then:
                  - lambda: |-
                      id(watering_by_script) = true;
                  - light.turn_on:
                      id: pump_2
                      brightness: !lambda |-
                        return std::min(1.0f, id(watering_percent_2).state / 100.0f + 0.2f);
                  - delay: 1000ms
                  - light.turn_on:
                      id: pump_2
                      brightness: !lambda |-
                        return id(watering_percent_2).state / 100.0f;
                      transition_length: 1s
                  - repeat:
                      count: !lambda |-
                        return (int)(id(watering_seconds_2).state * 10);
                      then:
                        - delay: 100ms
                        - if:
                            condition:
                              lambda: |-
                                return id(tank_empty).state && !id(ignore_water_check).state;
                            then:
                              - light.turn_off: pump_2
                              - lambda: |-
                                  id(watering_by_script) = false;
                              - script.stop: watering_cycle
                  - light.turn_off: pump_2
                  - lambda: |-
                      id(watering_by_script) = false;
                      id(today_watered_seconds_2) += (int)id(watering_seconds_2).state;
                  - sensor.template.publish:
                      id: today_seconds_2
                      state: !lambda "return (float)id(today_watered_seconds_2);"
            - if:
                condition:
                  lambda: |-
                    return ( !id(tank_empty).state || id(ignore_water_check).state )
                           && id(watering_seconds_3).state > 0
                           && (id(watering_schedule_mask) & 0x4)
                           && (id(daily_limit_3).state == 0 || id(today_watered_seconds_3) < id(daily_limit_3).state);
                then:
                  - lambda: |-
                      id(watering_by_script) = true;
                  - light.turn_on:
                      id: pump_3
                      brightness: !lambda |-
                        return std::min(1.0f, id(watering_percent_3).state / 100.0f + 0.2f);
                  - delay: 1000ms
                  - light.turn_on:
                      id: pump_3
                      brightness: !lambda |-
                        return id(watering_percent_3).state / 100.0f;
                      transition_length: 1s
                  - repeat:
                      count: !lambda |-
                        return (int)(id(watering_seconds_3).state * 10);
                      then:
                        - delay: 100ms
                        - if:
                            condition:
                              lambda: |-
                                return id(tank_empty).state && !id(ignore_water_check).state;
                            then:
                              - light.turn_off: pump_3
                              - lambda: |-
                                  id(watering_by_script) = false;
                              - script.stop: watering_cycle
                  - light.turn_off: pump_3
                  - lambda: |-
                      id(watering_by_script) = false;
                      id(today_watered_seconds_3) += (int)id(watering_seconds_3).state;
                  - sensor.template.publish:
                      id: today_seconds_3
                      state: !lambda "return (float)id(today_watered_seconds_3);"
            - if:
                condition:
                  lambda: |-
                    return ( !id(tank_empty).state || id(ignore_water_check).state )
                           && id(watering_seconds_4).state > 0
                           && (id(watering_schedule_mask) & 0x8)
                           && (id(daily_limit_4).state == 0 || id(today_watered_seconds_4) < id(daily_limit_4).state);
                then:
                  - lambda: |-
                      id(watering_by_script) = true;
                  - light.turn_on:
                      id: pump_4
                      brightness: !lambda |-
                        return std::min(1.0f, id(watering_percent_4).state / 100.0f + 0.2f);
                  - delay: 1000ms
                  - light.turn_on:
                      id: pump_4
                      brightness: !lambda |-
                        return id(watering_percent_4).state / 100.0f;
                      transition_length: 1s
                  - repeat:
                      count: !lambda |-
                        return (int)(id(watering_seconds_4).state * 10);
                      then:
                        - delay: 100ms
                        - if:
                            condition:
                              lambda: |-
                                return id(tank_empty).state && !id(ignore_water_check).state;
                            then:
                              - light.turn_off: pump_4
                              - lambda: |-
                                  id(watering_by_script) = false;
                              - script.stop: watering_cycle
                  - light.turn_off: pump_4
                  - lambda: |-
                      id(watering_by_script) = false;
                      id(today_watered_seconds_4) += (int)id(watering_seconds_4).state;
                  - sensor.template.publish:
                      id: today_seconds_4
                      state: !lambda "return (float)id(today_watered_seconds_4);"
            - lambda: |-
                id(watering_schedule_mask) = 0;
          else:
            - logger.log: "水箱缺水，跳过定时浇水"

  - id: watering_schedule_check
    mode: queued
    then:
      - if:
          condition:
            lambda: |-
              if (id(watering_mode).current_option() != "定时") return false;
              if (!id(watering_schedule_error).empty()) return false;
              if (!id(sntp_time).now().is_valid()) return false;

              auto now = id(sntp_time).now();
              std::string current_minute = now.strftime("%H:%M");
              std::string current_slot = now.strftime("%Y-%m-%d %H:%M");
              if (id(last_watering_schedule_fire) == current_slot) return false;

              std::string schedule = id(watering_times).state;
              auto trim = [](std::string value) -> std::string {
                const char* ws = " \t\r\n";
                size_t start = value.find_first_not_of(ws);
                if (start == std::string::npos) return "";
                size_t end = value.find_last_not_of(ws);
                return value.substr(start, end - start + 1);
              };
              auto is_valid_hhmm = [](const std::string &value) -> bool {
                if (value.size() != 5) return false;
                if (value[2] != ':') return false;
                if (!std::isdigit((unsigned char)value[0])) return false;
                if (!std::isdigit((unsigned char)value[1])) return false;
                if (!std::isdigit((unsigned char)value[3])) return false;
                if (!std::isdigit((unsigned char)value[4])) return false;
                int hour = (value[0] - '0') * 10 + (value[1] - '0');
                int minute = (value[3] - '0') * 10 + (value[4] - '0');
                return hour >= 0 && hour <= 23 && minute >= 0 && minute <= 59;
              };

              size_t start = 0;
              while (start < schedule.size()) {
                size_t end = schedule.find_first_of(",;\n", start);
                std::string token = schedule.substr(start, end == std::string::npos ? schedule.size() - start : end - start);
                token = trim(token);
                if (!token.empty()) {
                  size_t sep = token.find_first_of("=|");
                  std::string time_part = trim(sep == std::string::npos ? token : token.substr(0, sep));
                  std::string mask_part = sep == std::string::npos ? "1234" : trim(token.substr(sep + 1));
                  if (!is_valid_hhmm(time_part)) {
                    ESP_LOGW("watering", "Invalid schedule time format: %s", time_part.c_str());
                    if (start == 0) return false;
                    if (end == std::string::npos) break;
                    start = end + 1;
                    continue;
                  }
                  if (time_part == current_minute) {
                    int mask = 0;
                    if (sep == std::string::npos) {
                      mask = 0xF;
                    } else if (!mask_part.empty()) {
                      for (char c : mask_part) {
                        if (c == '1') mask |= 0x1;
                        if (c == '2') mask |= 0x2;
                        if (c == '3') mask |= 0x4;
                        if (c == '4') mask |= 0x8;
                      }
                    }
                    if (mask == 0 && sep != std::string::npos) {
                      ESP_LOGW("watering", "Invalid schedule mask: %s", mask_part.c_str());
                      return false;
                    }
                    id(watering_schedule_mask) = mask;
                    id(last_watering_schedule_fire) = current_slot;
                    return true;
                  }
                }
                if (end == std::string::npos) break;
                start = end + 1;
              }
              return false;
          then:
            - logger.log: "触发定时浇水"
            - script.execute: watering_cycle

  - id: watering_sensor_check
    mode: queued
    then:
      - if:
          condition:
            lambda: |-
              if (id(watering_mode).current_option() != "传感器") return false;
              if (!id(sntp_time).now().is_valid()) return false;

              auto now = id(sntp_time).now();
              uint32_t now_ts = now.timestamp;
              uint32_t hold_s = (uint32_t) id(sensor_watering_hold_minutes).state * 60U;
              int mask = 0;

              if (id(percent_1).has_state()) {
                if (id(percent_1).state < id(sensor_watering_threshold_1).state) {
                  if (id(sensor_low_since_1) == 0) id(sensor_low_since_1) = now_ts;
                  if (now_ts >= id(sensor_low_since_1) && (now_ts - id(sensor_low_since_1)) >= hold_s) {
                    mask |= 0x1;
                    id(sensor_low_since_1) = 0;
                  }
                } else {
                  id(sensor_low_since_1) = 0;
                }
              }

              if (id(percent_2).has_state()) {
                if (id(percent_2).state < id(sensor_watering_threshold_2).state) {
                  if (id(sensor_low_since_2) == 0) id(sensor_low_since_2) = now_ts;
                  if (now_ts >= id(sensor_low_since_2) && (now_ts - id(sensor_low_since_2)) >= hold_s) {
                    mask |= 0x2;
                    id(sensor_low_since_2) = 0;
                  }
                } else {
                  id(sensor_low_since_2) = 0;
                }
              }

              if (id(percent_3).has_state()) {
                if (id(percent_3).state < id(sensor_watering_threshold_3).state) {
                  if (id(sensor_low_since_3) == 0) id(sensor_low_since_3) = now_ts;
                  if (now_ts >= id(sensor_low_since_3) && (now_ts - id(sensor_low_since_3)) >= hold_s) {
                    mask |= 0x4;
                    id(sensor_low_since_3) = 0;
                  }
                } else {
                  id(sensor_low_since_3) = 0;
                }
              }

              if (id(percent_4).has_state()) {
                if (id(percent_4).state < id(sensor_watering_threshold_4).state) {
                  if (id(sensor_low_since_4) == 0) id(sensor_low_since_4) = now_ts;
                  if (now_ts >= id(sensor_low_since_4) && (now_ts - id(sensor_low_since_4)) >= hold_s) {
                    mask |= 0x8;
                    id(sensor_low_since_4) = 0;
                  }
                } else {
                  id(sensor_low_since_4) = 0;
                }
              }

              if (mask == 0) return false;
              id(watering_schedule_mask) = mask;
              return true;
          then:
            - logger.log: "触发传感器浇水"
            - script.execute: watering_cycle

  - id: auto_measure_task
    mode: single
    then:
      - while:
          condition:
            lambda: |-
              return true;
          then:
            - logger.log: "执行自动测量任务"
            - script.execute: measure_all
            - delay: !lambda |-
                return (int)id(measure_interval).state * 60000;

  - id: measure_all
    mode: restart
    then:

      - switch.turn_on: vcc_1
      - delay: 2500ms
      - repeat:
          count: 7
          then:
            - component.update: raw_1
            - component.update: raw_2
            - delay: 200ms
      - switch.turn_off: vcc_1
      - delay: 1500ms
      - switch.turn_on: vcc_2
      - delay: 2500ms
      - repeat:
          count: 7
          then:
            - component.update: raw_3
            - component.update: raw_4
            - delay: 200ms
      - switch.turn_off: vcc_2
      - component.update: percent_1
      - component.update: percent_2
      - component.update: percent_3
      - component.update: percent_4
      - script.execute: watering_sensor_check
      - lambda: |-
          auto now = id(sntp_time).now();
          std::string today = now.strftime("%Y-%m-%d");
          if (id(today_date) != today) {
            id(today_date) = today;
            id(today_watered_seconds_1) = 0;
            id(today_watered_seconds_2) = 0;
            id(today_watered_seconds_3) = 0;
