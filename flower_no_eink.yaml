# ==========================================
# 水泵控制
# ==========================================
light:
  - platform: monochromatic
    output: pump_1_output
    name: "水泵1"
    icon: "mdi:water-pump"
    id: pump_1
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - if:
            condition:
              or:
                - lambda: |-
                    return !id(tank_empty).state;
                - lambda: |-
                    return id(ignore_water_check).state;
            then:
              - if:
                  condition:
                    time.has_time:
                  then:
                    - text_sensor.template.publish:
                        id: watered_1
                        state: !lambda |-
                          auto stamp = id(sntp_time).now().strftime("%m-%d %H:%M");
                          id(last_watered_1) = stamp;
                          return stamp;
                    - if:
                        condition:
                          lambda: |-
                            return !id(watering_by_script);
                        then:
                          - lambda: |-
                              id(pump_run_ticks_1) = (int)(id(watering_seconds_1).state * 10);
                          - while:
                              condition:
                                lambda: |-
                                  return id(pump_run_ticks_1) > 0 &&
                                         (!id(tank_empty).state || id(ignore_water_check).state);
                              then:
                                - delay: 100ms
                                - lambda: |-
                                    id(pump_run_ticks_1)--;
                          - light.turn_off: pump_1
            else:
              - light.turn_off: pump_1

  - platform: monochromatic
    output: pump_2_output
    name: "水泵2"
    icon: "mdi:water-pump"
    id: pump_2
    restore_mode: RESTORE_DEFAULT_OFF
