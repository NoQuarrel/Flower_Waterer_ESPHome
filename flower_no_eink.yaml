esphome:
  name: flower
  on_boot:
    priority: -100
    then:
      - script.execute: watering_schedule_validate
      - text_sensor.template.publish:
          id: watered_1
          state: !lambda |-
            return id(last_watered_1);
      - text_sensor.template.publish:
          id: watered_2
          state: !lambda |-
            return id(last_watered_2);
      - text_sensor.template.publish:
          id: watered_3
          state: !lambda |-
            return id(last_watered_3);
      - text_sensor.template.publish:
          id: watered_4
          state: !lambda |-
            return id(last_watered_4);
      - sensor.template.publish:
          id: today_seconds_1
          state: !lambda "return (float)id(today_watered_seconds_1);"
      - sensor.template.publish:
          id: today_seconds_2
          state: !lambda "return (float)id(today_watered_seconds_2);"
      - sensor.template.publish:
          id: today_seconds_3
          state: !lambda "return (float)id(today_watered_seconds_3);"
      - sensor.template.publish:
          id: today_seconds_4
          state: !lambda "return (float)id(today_watered_seconds_4);"
      - script.execute: auto_measure_task
      
esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger: 

api:
  encryption:
    key: !secret flower_api_key

ota:
  - platform: esphome
    password: !secret flower_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Flower Fallback Hotspot"
    password: !secret flower_ap_password

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: "CST-8"
    on_time:
      - seconds: 0
        then:
          - script.execute: watering_schedule_check

