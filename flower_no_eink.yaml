    id: pump_1_output

  - platform: ledc
    pin: 18
    frequency: 1000 Hz
    id: pump_2_output

  - platform: ledc
    pin:
      number: 13
      ignore_pin_validation_error: true
    frequency: 1000 Hz
    id: pump_3_output

  - platform: ledc
    pin:
      number: 12
      ignore_pin_validation_error: true
    frequency: 1000 Hz
