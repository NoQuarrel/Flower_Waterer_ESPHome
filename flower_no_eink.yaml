sensor:
  - platform: wifi_signal
    name: "WiFi 信号强度 Signal"
    id: wifi_rssi
    update_interval: 5min

  - platform: adc
    pin: GPIO4
    name: "P1电压 Voltage"
    id: raw_1
    unit_of_measurement: "V"
    attenuation: 12db
    update_interval: never
    accuracy_decimals: 3
    force_update: true
    filters:
      - lambda: |-
          static std::vector<float> buf;
          static uint32_t last_time = 0;
          uint32_t now = millis();
          if (now - last_time > 2000) {
            buf.clear();
          }
          last_time = now;
          buf.push_back(x);
          const int N = 7;
          if (buf.size() < N) {
            return NAN;
          }
          std::vector<float> sorted = buf;
          std::sort(sorted.begin(), sorted.end());
          float sum = 0;
          for (int i = 2; i < N - 2; i++) {
            sum += sorted[i];
          }
          float result = sum / (N - 4);
          ESP_LOGI("P1_FILTER", "raw=[%.3f %.3f %.3f %.3f %.3f %.3f %.3f] result=%.3f",
                   buf[0], buf[1], buf[2], buf[3], buf[4], buf[5], buf[6],
                   result);
          buf.clear();
          return result;

  - platform: template
    id: percent_1
    name: "P1湿度 Moisture"
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    accuracy_decimals: 0
    update_interval: never
    lambda: |-
      float v = id(raw_1).state;
      float d = id(d1).state;
      float w = id(w1).state;
      if (std::isnan(v)) return {};
      if (v >= d) return 0.0;
      if (v <= w) return 100.0;
      float result = (v - d) / (w - d) * 100.0;
      return result;
    filters:
      - sliding_window_moving_average:
          window_size: 6
          send_every: 1
          send_first_at: 1
      - lambda: |-
          return round(x);

  - platform: adc
    pin: GPIO0
    name: "P2电压 Voltage"
    id: raw_2
    unit_of_measurement: "V"
    attenuation: 12db
    update_interval: never
    accuracy_decimals: 3
    force_update: true
    filters:
      - lambda: |-
          static std::vector<float> buf;
          static uint32_t last_time = 0;
          uint32_t now = millis();
          if (now - last_time > 2000) {
            buf.clear();
          }
          last_time = now;
          buf.push_back(x);
          const int N = 7;
          if (buf.size() < N) {
            return NAN;
          }
          std::vector<float> sorted = buf;
          std::sort(sorted.begin(), sorted.end());
          float sum = 0;
          for (int i = 2; i < N - 2; i++) {
            sum += sorted[i];
          }
          float result = sum / (N - 4);
          ESP_LOGI("P2_FILTER", "raw=[%.3f %.3f %.3f %.3f %.3f %.3f %.3f] result=%.3f",
                   buf[0], buf[1], buf[2], buf[3], buf[4], buf[5], buf[6],
                   result);
          buf.clear();
          return result;

  - platform: template
    id: percent_2
    name: "P2湿度 Moisture"
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    accuracy_decimals: 0
    update_interval: never
    lambda: |-
      float v = id(raw_2).state;
